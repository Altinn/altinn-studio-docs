# CodeRabbit Configuration
# This file configures how CodeRabbit reviews your pull requests

language: en-GB
tone_instructions: "Please check documentation in British English (en-GB) and Norwegian Bokmål (nb-NO)."
early_access: false
enable_free_tier: true
reviews:
  profile: "chill"
  high_level_summary: true
  tools:
    languagetool:
      enabled: true
      level: "picky"
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    biome:
      enabled: true
chat:
  auto_reply: true
  create_issues: true
knowledge_base: {}
code_generation:
  docstrings:
    language: en-GB
