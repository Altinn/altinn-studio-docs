# Multi-repo komponeringskonfigurasjon for altinn-docs-astro.
#
# Hver "source" peker på en innholdskilde (et repo, eller en lokal sti).
# Hver source har en eller flere "snapshots" som mountes til en URL-prefiks.
# I MVP er det kun én local source (dette repoet selv).
# Git-baserte sources (tag/branch) er designet for, men implementeres i fase 2.

site:
  baseURL: https://docs.altinn.studio/
  defaultLang: nb
  languages: [nb, en]
  title:
    nb: Altinn docs
    en: Altinn docs
  editURL: https://github.com/altinn/altinn-studio-docs/blob/master/content/

linting:
  # Hvordan håndtere cross-source-lenker uten versjonspinne:
  #   off   — ikke sjekk
  #   warn  — logg, men eksitkode 0
  #   error — logg og eksitkode 1
  crossSourceLinks: warn
  allowFloatingCrossSourceLinks: false

sources:
  # MVP: peker mot dette repoet selv. Eksisterende mappebasert versjonering
  # (v8, v10 under altinn-studio) bevares som-er — vi mounter hele content
  # direkte. versionsFromFolders gir nav-tree-builderen beskjed om at
  # undermapper med navn på formen "vN..." er versjoner under det produktet.
  - name: altinn-docs-monorepo
    type: local
    path: ../              # relativt til astro/-mappa
    repo: https://github.com/altinn/altinn-studio-docs   # for "rediger på github"-lenker
    contentDir: content
    staticDir: static
    i18nDir: i18n
    mount: /
    snapshots:
      - id: current
        ref: working-tree
        label: current
        active: true
        versionsFromFolders: true
        editBranch: master   # working-tree har ingen ref vi kan bruke for edit-lenker

  # Eksternt repo for Altinn Profil (sluttbruker-dokumentasjon).
  # Foreløpig henter vi fra feat/user-doc-branchen til doc/end_users/ blir
  # merget til main. Mountes på /altinn-profile slik at landingssiden lander
  # på /<lang>/altinn-profile/ — samme URL som aliasene i kildefilen.
  - name: altinn-profile
    type: git
    repo: https://github.com/Altinn/altinn-profile.git
    contentDir: doc/end_users
    mount: /altinn-profile
    snapshots:
      - id: feat-user-doc
        ref: heads/feat/user-doc
        label: current
        active: true

